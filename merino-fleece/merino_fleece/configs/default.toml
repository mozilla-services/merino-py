# Default configurations that may be overridden by the counterparts defined in:
# `development.toml`, `production.toml`, `testing.toml`, or environment variables.

[default]

[default.pii]
# MERINO_FLEECE_PII__MODEL
# SpaCy pre-trained NLP model used for NER detection.
# Allowed values: "en_core_web_sm", "en_core_web_md", "en_core_web_lg".
model = "en_core_web_sm"

# MERINO_FLEECE_PII__EXCLUDED_COMPONENTS
# SpaCy pipeline components to exclude at model load time. Only NER is needed.
excluded_components = ["tok2vec", "tagger", "parser", "attribute_ruler", "lemmatizer"]

# MERINO_FLEECE_PII__QUERY_CHARACTER_MAX
# Maximum allowed length of the `q` query parameter.
query_character_max = 500

[default.sentry]
# MERINO_FLEECE_SENTRY__MODE
# One of "disabled", "release", "debug". When "disabled", no Sentry client is initialized.
mode = "disabled"

# MERINO_FLEECE_SENTRY__DSN
# Sentry DSN. Provided via env var in stage/production. Ignored when mode = "disabled".
dsn = ""

# MERINO_FLEECE_SENTRY__ENV
# Sentry environment tag. One of "prod", "stage", "dev".
env = "dev"

# MERINO_FLEECE_SENTRY__TRACES_SAMPLE_RATE
# Fraction of transactions to capture for performance monitoring, in [0.0, 1.0].
traces_sample_rate = 0.0

[default.logging]
# MERINO_FLEECE_LOGGING__FORMAT
# Either "mozlog" or "pretty".
format = "mozlog"

# MERINO_FLEECE_LOGGING__LEVEL
# Any of "DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL".
level = "INFO"

# MERINO_FLEECE_LOGGING__CAN_PROPAGATE
# Whether the merino-fleece loggers should propagate to the root logger.
can_propagate = false
