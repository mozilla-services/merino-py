# Configurations for production. Configurations defined here will override the
# counterparts in `default.toml`.

# You can manually switch to this environment via:
#
# MERINO_ENV=production /path/to/your/command

[production]
# For `list` or `table` settings, `dynaconf_merge` allows you to merge settings with the default
# settings. This enables merge for the entire `production` environment.
dynaconf_merge = true

[production.runtime]
# MERINO_RUNTIME__SKIP_GCP_CLIENT_AUTH
# Skip providing explicit `credentials` parameter to the gcp Client instance constructor.
# In production and staging environments, the auth credentials are automatically picked up
# from the ADC file in the GCP Project. For dev & testing envs, we use anonymous credentials.
skip_gcp_client_auth = true

# MERINO_RUNTIME__DISABLED_PROVIDERS
# List containing providers to disable at startup.
# Prevents a provider from being instantiated.
disabled_providers = ["amo"]

[production.accuweather]
url_base = "https://api.accuweather.com"

# TODO - update this to GCPV2 values before removing image_gcs_v2 below
[production.image_gcs]
# MERINO_IMAGE_GCS__GCS_PROJECT
# GCS project name that contains domain data
gcs_project = "moz-fx-merino-prod-1c2f"

# MERINO_IMAGE_GCS__GCS_BUCKET
# GCS bucket that contains domain data files
gcs_bucket = "merino-images-prodpy"

# MERINO_IMAGE_GCS__CDN_HOSTNAME
# CDN hostname used for public URLs of stored images
cdn_hostname = "merino-images.services.mozilla.com"

[production.games_particle_gcs]
# MERINO_GAMES_PARTICLE__GCS_PROJECT
# GCS project name that contains domain data (GCP V2)
gcs_project = "moz-fx-merino-prod-5de4"

# MERINO_GAMES_PARTICLE__GCS_BUCKET
# GCS bucket that contains domain data files (GCP V2)
gcs_bucket = "merino-games-particle-prod"

# MERINO_GAMES_PARTICLE__CDN_HOSTNAME
# CDN hostname used for public URL (GCP V2)
cdn_hostname = "prod-games-particle.merino.prod.webservices.mozgcp.net"


[production.engagement]
# MERINO_ENGAGEMENT__GCS_STORAGE_BUCKET
gcs_storage_bucket = "merino-airflow-data-prod"

# MERINO_ENGAGEMENT__GCS_BQ_BUCKET
gcs_bq_project = "moz-fx-data-shared-prod"

# MERINO_ENGAGEMENT__GCS_STORAGE_PROJECT
gcs_storage_project = "moz-fx-merino-prod-5de4"

[production.image_gcs_v2]
# MERINO_IMAGE_GCS_V2__GCS_PROJECT
# GCS project name that contains domain data
gcs_project = "moz-fx-merino-prod-5de4"

# MERINO_IMAGE_GCS_V2__GCS_BUCKET
# GCS bucket that contains domain data files
gcs_bucket = "merino-images-prod"

# MERINO_IMAGE_GCS_V2__CDN_HOSTNAME
# CDN hostname used for public URLs of stored images
cdn_hostname = "prod-images.merino.prod.webservices.mozgcp.net"

[production.providers.adm.thompson]
# MERINO_PROVIDERS__ADM__THOMPSON__ENABLED
enabled = true

# MERINO_PROVIDERS__ADM__THOMPSON__DUMMY_ENABLED
dummy_enabled = true

# MERINO_PROVIDERS__ADM__THOMPSON__MIN_ATTEMPTED_COUNT
min_attempted_count = 500

# MERINO_PROVIDERS__ADM__THOMPSON__DUMMY_ENGAGED_COUNT
dummy_engaged_count = 1

# MERINO_PROVIDERS__ADM__THOMPSON__DUMMY_ATTEMPTED_COUNT
dummy_attempted_count = 1000

# MERINO_PROVIDERS__ADM__THOMPSON__CHECK_CLIENT_VARIANTS
check_client_variants = false

# MERINO_PROVIDERS__ADM__THOMPSON__DRY_RUN
dry_run = true

[production.providers.top_picks]
# MERINO_PROVIDERS__TOP_PICKS__DOMAIN_DATA_SOURCE
# Enum of either `remote` or `local` that defines whether domain data
# is remotely or locally acquired.
domain_data_source = "remote"

[production.curated_recommendations.gcs]
# MERINO__CURATED_RECOMMENDATIONS__GCS__BUCKET_NAME
# GCS v2 bucket that contains aggregate engagement and prior data
bucket_name = "merino-airflow-data-prod"

# MERINO__CURATED_RECOMMENDATIONS__GCS__GCP_PROJECT
# GCS v2 project name where the GCS bucket lives.
gcp_project = "moz-fx-merino-prod-5de4"

[production.providers.polygon]
# MERINO_PROVIDERS__POLYGON__CACHE
# The store used to finance data. Either `redis` or `none`.
# If `redis`, the global Redis settings must be set. See redis.server.
cache = "redis"

[production.providers.flightaware]
# MERINO_PROVIDERS__FLIGHTAWARE__CACHE
# The store used for flightaware data. Either `redis` or `none`.
# If `redis`, the global Redis settings must be set. See redis.server.
cache = "redis"

[production.query_normalization]
enabled = true
data_source = "remote"
# TODO: set GCS bucket for production environment
gcs_bucket = ""

[production.ml_recommendations.gcs]
# MERINO__ML_RECOMMENDATIONS__GCS__GCP_PROJECT
# GCP project name where the GCS bucket lives.
gcp_project = "moz-fx-merino-prod-5de4"

# MERINO__ML_RECOMMENDATIONS__GCS__BUCKET_NAME
# GCS bucket that contains ranked articles from ml
bucket_name = "merino-ml-data-prod"

[production.interest_cohort_model.gcs]
# GCP project name where the GCS bucket lives.
gcp_project = "moz-fx-merino-prod-5de4"

# GCS bucket that contains cohort model data
bucket_name = "merino-ml-data-prod"
