# Configurations for stage. Configurations defined here will override the
# counterparts in `default.toml`.

# You can manually switch to this environment via:
#
# MERINO_ENV=stage /path/to/your/command

[stage]
# For `list` or `table` settings, `dynaconf_merge` allows you to merge settings with the default
# settings. This enables merge for the entire `stage` environment.
dynaconf_merge = true

[stage.runtime]
# MERINO_RUNTIME__SKIP_GCP_CLIENT_AUTH
# Skip providing explicit `credentials` parameter to the gcp Client instance constructor.
# In production and staging environments, the auth credentials are automatically picked up
# from the ADC file in the GCP Project. For dev & testing envs, we use anonymous credentials.
skip_gcp_client_auth = true

[stage.accuweather]
url_base = "https://api.accuweather.com"

[stage.image_gcs]
# MERINO_IMAGE_GCS__GCS_PROJECT
gcs_project = "moz-fx-merino-nonprod-ee93"

# MERINO_IMAGE_GCS__GCS_BUCKET
gcs_bucket = "merino-images-stagepy"

# MERINO_IMAGE_GCS__ENABLED
# Whether to enable fetching from GCS.
# Set to `true` in production and `false` in staging or development.
gcs_enabled = false

[stage.image_gcs_v2]
# MERINO_IMAGE_GCS_V2__GCS_PROJECT
gcs_project = "moz-fx-merino-nonprod-db57"

# MERINO_IMAGE_GCS_V2__GCS_BUCKET
gcs_bucket = "merino-images-stage"

# MERINO_IMAGE_GCS_V2__CDN_HOSTNAME
# Stage temporarily points at the prod CDN because the stage image bucket
# isn't populated with the WCS logo assets yet. Revisit once `merino-images-stage`
# carries the same content as prod.
cdn_hostname = "prod-images.merino.prod.webservices.mozgcp.net"

[stage.games_particle_gcs]
# MERINO_GAMES_PARTICLE_GCS__GCS_PROJECT (GCP V2)
gcs_project = "moz-fx-merino-nonprod-db57"

# MERINO_GAMES_PARTICLE_GCS__ENABLED
# Whether to enable fetching from GCS.
# Set to `true` in production and `false` in staging or development.
gcs_enabled = false

# MERINO_GAMES_PARTICLE__GCS_BUCKET
# GCS bucket that contains domain data files (GCP V2)
gcs_bucket = "merino-games-particle-stage"

# MERINO_GAMES_PARTICLE__CDN_HOSTNAME
# CDN hostname used for public URL (GCP V2)
cdn_hostname = "stage-games-particle.merino.nonprod.webservices.mozgcp.net"

[stage.games_providers.particle]
# MERINO_GAMES_PROVIDERS__PARTICLE__ENABLED
# Enable/disable execution of the Particle file update process
# Schedule is managed by K8s cron job
enabled = true

# MERINO_GAMES_PROVIDERS__PARTICLE__GAME_URL
# The URL pointing to the game hosted in GCP (GCS)
game_url = "https://stage-games-particle.merino.nonprod.webservices.mozgcp.net/index.html"

[stage.providers.top_picks]
# MERINO_PROVIDERS__TOP_PICKS__DOMAIN_DATA_SOURCE
domain_data_source = "remote"

[stage.curated_recommendations.gcs]
# MERINO__CURATED_RECOMMENDATIONS__GCS__BUCKET_NAME
# GCS bucket that contains aggregate engagement and prior data
bucket_name = "merino-airflow-data-stagepy"

# MERINO__CURATED_RECOMMENDATIONS__GCS__GCP_PROJECT
# GCP project name where the GCS bucket lives.
gcp_project = "moz-fx-merino-nonprod-ee93"

[stage.ml_recommendations.gcs]
# MERINO__ML_RECOMMENDATIONS__GCS__GCP_PROJECT
# GCP project name where the GCS bucket lives.
gcp_project = "moz-fx-merino-nonprod-db57"

# MERINO__ML_RECOMMENDATIONS__GCS__BUCKET_NAME
# GCS bucket that contains ranked articles from ml
bucket_name = "merino-ml-data-stage"

[stage.interest_cohort_model.gcs]
# GCP project name where the GCS bucket lives.
gcp_project = "moz-fx-merino-nonprod-db57"

# GCS bucket that contains cohort model data
bucket_name = "merino-ml-data-stage"

[stage.contextual_interest]
# Enabled in staging for testing
enabled = true

[stage.contextual_interest.gcs]
# GCP project name where the GCS bucket lives.
gcp_project = "moz-fx-merino-nonprod-db57"

# GCS bucket that contains the LinTS-interest safetensors bundle.
bucket_name = "merino-ml-data-stage"

[stage.spindle.api]
# MERINO_SPINDLE__API__BASE_URL
base_url = "http://spindle-stage.llm-proxy.nonprod.dataservices.mozgcp.net"


[stage.engagement]
# MERINO_ENGAGEMENT__GCS_STORAGE_BUCKET
gcs_storage_bucket = "merino-airflow-data-stage"

# MERINO_ENGAGEMENT__GCS_BQ_BUCKET
gcs_bq_project = "moz-fx-data-shared-prod"

# MERINO_ENGAGEMENT__GCS_STORAGE_PROJECT
gcs_storage_project = "moz-fx-merino-nonprod-db57"

[stage.providers.adm.thompson]
# MERINO_PROVIDERS__ADM__THOMPSON__ENABLED
enabled = true

# MERINO_PROVIDERS__ADM__THOMPSON__MIN_ATTEMPTED_COUNT
min_attempted_count = 200

# MERINO_PROVIDERS__ADM__THOMPSON__DUMMY_ENGAGED_COUNT
dummy_engaged_count = 5

# MERINO_PROVIDERS__ADM__THOMPSON__DUMMY_ATTEMPTED_COUNT
dummy_attempted_count = 1000

[stage.query_normalization]
enabled = true
data_source = "remote"
gcs_bucket = "merino-ml-data-stage"

[stage.query_pattern_matching]
# MERINO_QUERY_PATTERN_MATCHING__ENABLED
# Master switch. When false the matcher is never built and the hot path is a no-op.
enabled = false

# MERINO_QUERY_PATTERN_MATCHING__SAMPLE_RATE
# Fraction of suggest requests to evaluate, 0.0–1.0. 0.0 disables evaluation.
sample_rate = 0.0

# MERINO_QUERY_PATTERN_MATCHING__PATTERNS
# List of { id = "...", regex = "..." }. `id` is a low-cardinality metric label
# (^[a-z][a-z0-9_]{0,63}$); `regex` is matched case-insensitively. Invalid
# entries are skipped at build time rather than failing startup.
patterns = []

[stage.mars]
# MERINO_MARS__BASE_URL
base_url = "https://ads.allizom.org/v1/suggest/"

# MERINO_MARS__SEND_TEST_PADDING
send_test_padding = true
