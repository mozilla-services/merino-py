events {
    worker_connections 1024;
}

http {
    lua_shared_dict delay_limit 10m;

    server {
        listen 80;

        location /ohttp-keys {
            access_by_lua_block {
                ngx.sleep(0.01)
            }

            content_by_lua_block {
                local file = io.open("/opt/config.hex", "r")
                if file then
                    local hex_config = file:read("*all"):gsub("%s+", "")
                    file:close()

                    local binary = ""
                    for i = 1, #hex_config, 2 do
                        local hex_byte = hex_config:sub(i, i+1)
                        binary = binary .. string.char(tonumber(hex_byte, 16))
                    end

                    ngx.header["Content-Type"] = "application/octet-stream"
                    ngx.print(binary)
                else
                    ngx.status = 500
                    ngx.say("Config not available")
                end
            }
        }

        location /gateway {
            access_by_lua_block {
                ngx.sleep(0.01)
            }

            proxy_pass https://merino-service.default.svc.cluster.local:9443/;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            access_log /usr/local/openresty/nginx/logs/access.log;
        }
    }
}
