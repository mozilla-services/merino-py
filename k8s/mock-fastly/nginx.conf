events {
    worker_connections 1024;
}

http {
    lua_shared_dict delay_limit 10m;
    
    server {
        listen 80;
        
        location / {
            # Add 10ms delay using Lua
            access_by_lua_block {
                ngx.sleep(0.01)  -- 10ms delay
            }
            
            # Proxy to OHTTP gateway, stripping /fastly if present
            rewrite ^/fastly/(.*) /$1 break;
            proxy_pass http://merino-service.default.svc.cluster.local:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Log for debugging
            access_log /usr/local/openresty/nginx/logs/access.log;
        }
    }
}