version: 1.0

service: Merino
suggest:
  query_pii_detected:
    description: |
      Measurement for queries that contain pii
    type: counter
    labels:
      type:
        - email
        - numeric
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []
  intent_word_count:
    description: |
      Count of intent words contained in a query
    type: counter
    labels:
      - name: provider
        description: |
          The provider which accepted the request
      - name: word
        description: |
          The matched intent word (can have more than one per query)
    scope: |
      Provider served by the "/api/v1/suggest" API endpoint
    alert_policy: []

suggest/accuweather:
  providers_accuweather_query_weather_report:
    description: |
      Measurement of the volume of weather requests
    type: counter
    labels:
      - name: source
        description: |
          Origin of the weather request
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []
suggest/polygon:
  polygon_provider_query_latency:
    description: |
      A gauge to track the latency for the polygon provider to return a finance suggestion
    type: gauge
    labels:
      - name: source
        description: |
          Origin of the finance suggestion request
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  polygon_request_snapshot_get_latency:
    description: |
      A gauge to track the latency for snapshot v3 get request
    type: gauge
    labels: [] # no labels
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  polygon_request_snapshot_get:
    description: |
      A counter for snapshot v3 get requests
    type: gauge
    labels: [] # no labels
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  polygon_request_snapshot_get_failed:
    description: |
      A counter for failed snapshot v3 get requests
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  polygon_snapshot_invalid:
    description: |
      A counter for invalid snapshots
    type: counter
    labels: [] # no labels
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  polygon_snapshot_cache_hit:
    description: |
      A counter for snapshot cache hits
    type: counter
    labels: [] # no labels
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  polygon_snapshot_cache_partial_hit:
    description: |
      A counter for partial snapshot cache hits where some tickers are cached and others are not
    type: counter
    labels: [] # no labels
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  polygon_snapshot_cache_miss:
    description: |
      A counter for snapshot cache misses
    type: counter
    labels: [] # no labels
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

suggest/yelp:
  yelp_request_business_search_get:
    description: |
      A gauge to track the latency for Yelp business search API requests
    type: gauge
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_request_business_search_success:
    description: |
      A counter for successful Yelp business search API requests
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_request_business_search_failed:
    description: |
      A counter for failed Yelp business search API requests
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_cache_hit:
    description: |
      A counter for Yelp cache hits
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_cache_miss:
    description: |
      A counter for Yelp cache misses
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_cache_set:
    description: |
      A counter for successful Yelp cache set operations
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_cache_error:
    description: |
      A counter for Yelp cache retrieval errors
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_cache_set_error:
    description: |
      A counter for Yelp cache set errors
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_cache_decode_error:
    description: |
      A counter for Yelp cache decode errors
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_cache_store_error:
    description: |
      A counter for Yelp cache store errors
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_business_invalid_response:
    description: |
      A counter for invalid Yelp business API responses
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_suggestions_count:
    description: |
      A counter for the number of Yelp suggestions returned
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

  yelp_initialization_completed:
    description: |
      A counter for completed Yelp provider initializations
    type: counter
    labels: []
    scope: |
      Provider initialization
    alert_policy: []
suggest/adm:
  providers_adm_thompson_select:
    description: |
      A counter for ADM provider Thompson sampling selection outcomes.
      The outcome tag indicates the result: selected (sampler picked a winner),
      suppressed (dummy candidate won, suggestion withheld), or skipped (single
      candidate below the min_attempted_count threshold, sampler bypassed).
    type: counter
    labels:
      - name: outcome
        description: |
          The sampling outcome (selected, suppressed, skipped)
      - name: subject
        description: |
          The identifier of the subject that has gone through Thompson sampling
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []

suggest/mars:
  mars_fetch:
    description: |
      A counter for MARS API fetch attempts during periodic data sync.
      The status tag indicates the outcome: success, not_modified, empty_response, or error.
    type: counter
    labels:
      - name: country
        description: |
          The country code for the fetched segment
      - name: form_factor
        description: |
          The form factor for the fetched segment
      - name: status
        description: |
          The fetch outcome (success, not_modified, empty_response, error)
    scope: |
      The ADM provider MARS backend data sync.
    alert_policy: []

  mars_fetch_response_size_bytes:
    description: |
      A gauge tracking the raw HTTP response body size in bytes from the MARS
      suggest/data endpoint. Useful for monitoring payload growth, especially
      when testing large responses (e.g. segmented caching validation).
    type: gauge
    labels:
      - name: country
        description: |
          The country code for the fetched segment
      - name: form_factor
        description: |
          The form factor for the fetched segment
    scope: |
      The ADM provider MARS backend data sync.
    alert_policy: []

  mars_data_staleness_seconds:
    description: |
      A gauge tracking the time in seconds since the last successful data fetch
      from MARS. Can be used to alert if data becomes stale.
    type: gauge
    labels: []
    scope: |
      The ADM provider MARS backend data sync.
    alert_policy: []

  amp.index.keyword_index_size:
    description: |
      A gauge tracking the number of keywords in the AMP index after a successful build.
    type: gauge
    labels:
      - name: index
        description: |
          The index identifier (country/form-factor segment)
    scope: |
      The ADM provider MARS backend data sync.
    alert_policy: []

  amp.index.suggestions_count:
    description: |
      A gauge tracking the number of suggestions in the AMP index after a successful build.
    type: gauge
    labels:
      - name: index
        description: |
          The index identifier (country/form-factor segment)
    scope: |
      The ADM provider MARS backend data sync.
    alert_policy: []

  amp.index.icons_count:
    description: |
      A gauge tracking the number of icons in the AMP index after a successful build.
    type: gauge
    labels:
      - name: index
        description: |
          The index identifier (country/form-factor segment)
    scope: |
      The ADM provider MARS backend data sync.
    alert_policy: []

  amp.index.advertisers_count:
    description: |
      A gauge tracking the number of advertisers in the AMP index after a successful build.
    type: gauge
    labels:
      - name: index
        description: |
          The index identifier (country/form-factor segment)
    scope: |
      The ADM provider MARS backend data sync.
    alert_policy: []

  amp.index.url_templates_count:
    description: |
      A gauge tracking the number of URL templates in the AMP index after a successful build.
    type: gauge
    labels:
      - name: index
        description: |
          The index identifier (country/form-factor segment)
    scope: |
      The ADM provider MARS backend data sync.
    alert_policy: []

suggest/flightaware:
  flightaware_request_summary_get:
    description: |
      A counter to measure the total number of API requests made to AeroAPI
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []
  flightaware_request_summary_get_latency:
    description: |
      A histogram to measure the latency of API requests to AeroAPI
    type: histogram
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []
  flightaware_request_summary_get_status:
    description: |
      A counter to measure the number of AeroAPI responses, labeled by HTTP status code.
    type: counter
    labels:
      - name: status_code
        description: |
          The HTTP status code returned by the API request (e.g., 200, 400, 500).
    scope: |
      The "api/v1/suggest" API endpoint.
    alert_policy: []
  providers_flightaware_flight_no_pattern_match_count:
    description: |
      A counter to measure how many user queries matched a valid flight number pattern
      and successfully triggered a FlightAware lookup.
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint
    alert_policy: []
  providers_flightaware_query_exception:
    description: |
      A counter to track unexpected errors raised during the FlightAware provider query flow.
    type: counter
    labels: []
    scope: |
      The "api/v1/suggest" API endpoint
    alert_policy: []

suggest/normalization:
  normalization_experiment_provider_match:
    description: |
      Tracks whether a normalized query produced a suggestion for a given
      provider. Emitted once per provider per request for treatment users
      in the query normalization experiment. Used to monitor how often
      normalization fires and whether it leads to new provider matches.
    type: counter
    labels:
      - name: provider
        description: |
          The provider being checked (e.g. "sports", "polygon")
      - name: matched
        description: |
          Whether the provider returned a suggestion ("True" or "False")
      - name: query_changed
        description: |
          Whether the normalization pipeline changed the query ("True" or "False")
    scope: |
      The "api/v1/suggest" API endpoint, treatment branch only.
    alert_policy: []

providers/manifest:
  manifest.lookup:
    description: |
      A counter incremented when a manifest-backed provider performs a key lookup.
      The result label indicates whether the lookup found a match or not.
    type: counter
    labels:
      - name: name
        description: |
          An identifier for the manifest, e.g. "logos"
      - name: result
        description: |
          The outcome of the lookup (e.g. "miss" when the requested key
          does not exist in the manifest).
    scope: |
      Any provider that uses the shared manifest metrics namespace.
    alert_policy: []

utils/synced_gcs_blob_v2:
  gcs.sync.data.not_ready:
    description: |
      A counter incremented when synced GCS blob data is accessed before it is available.
    type: counter
    labels:
      - name: bucket
        description: |
          The GCS bucket name.
      - name: blob
        description: |
          The full path to the GCS blob.
    scope: |
      Any component using SyncedGcsBlobV2.
    alert_policy: []

  gcs.sync.update.timing:
    description: |
      A timer covering the count and latency of GCS blob update task executions.
    type: timing
    labels:
      - name: bucket
        description: |
          The GCS bucket name.
      - name: blob
        description: |
          The full path to the GCS blob.
    scope: |
      Any component using SyncedGcsBlobV2.
    alert_policy: []

  gcs.sync.valid:
    description: |
      A gauge indicating whether the most recently fetched GCS blob data is valid (1) or invalid (0).
    type: gauge
    labels:
      - name: bucket
        description: |
          The GCS bucket name.
      - name: blob
        description: |
          The full path to the GCS blob.
    scope: |
      Any component using SyncedGcsBlobV2.
    alert_policy: []

  gcs.sync.fetch.response:
    description: |
      A counter for GCS blob fetch responses, labeled by HTTP status code.
    type: counter
    labels:
      - name: bucket
        description: |
          The GCS bucket name.
      - name: blob
        description: |
          The full path to the GCS blob.
      - name: status
        description: |
          The HTTP status code returned by the GCS fetch (e.g., 200, 404).
    scope: |
      Any component using SyncedGcsBlobV2.
    alert_policy: []

  gcs.sync.size:
    description: |
      A gauge tracking the size in bytes of the fetched GCS blob.
    type: gauge
    labels:
      - name: bucket
        description: |
          The GCS bucket name.
      - name: blob
        description: |
          The full path to the GCS blob.
    scope: |
      Any component using SyncedGcsBlobV2.
    alert_policy: []

  gcs.sync.last_updated:
    description: |
      A gauge tracking the time in seconds since the GCS blob was last successfully updated.
      Can be used to alert if data becomes stale.
    type: gauge
    labels:
      - name: bucket
        description: |
          The GCS bucket name.
      - name: blob
        description: |
          The full path to the GCS blob.
    scope: |
      Any component using SyncedGcsBlobV2.
    alert_policy: []

search/elasticsearch:
  es.search.count:
    description: |
      A counter for all Elasticsearch search attempts, incremented before the
      request is issued. Use alongside es.search.error to derive a success rate.
    type: counter
    labels:
      - name: index
        description: |
          The Elasticsearch index that was searched.
    scope: |
      Any provider backed by Elasticsearch (Wikipedia, Sports).
    alert_policy: []

  es.search.error:
    description: |
      A counter for failed Elasticsearch search requests.
    type: counter
    labels:
      - name: index
        description: |
          The Elasticsearch index that was searched.
      - name: status
        description: |
          The HTTP status code returned by Elasticsearch, or "unknown" for
          non-HTTP errors (e.g. connection errors, timeouts).
    scope: |
      Any provider backed by Elasticsearch (Wikipedia, Sports).
    alert_policy: []

weather/hourly_forecasts:
  weather_hourly_forecasts_request_timing:
    description: |
      A timer covering the count and latency of requests to the hourly forecasts endpoint
    type: timing
    labels: []
    scope: |
      The "api/v1/weather/hourly-forecasts" API endpoint.
    alert_policy: []

  accuweather_cache_hit_hourly_forecasts:
    description: |
      A counter for AccuWeather hourly forecast cache hits
    type: counter
    labels: []
    scope: |
      The "api/v1/weather" API endpoint.
    alert_policy: []

  accuweather_cache_fetch_miss_hourly_forecasts:
    description: |
      A counter for AccuWeather hourly forecast cache misses
    type: counter
    labels: []
    scope: |
      The "api/v1/weather" API endpoint.
    alert_policy: []

  accuweather_cache_hourly_forecast_read_error:
    description: |
      A counter for errors reading hourly forecast data from cache
    type: counter
    labels: []
    scope: |
      The "api/v1/weather" API endpoint.
    alert_policy: []
