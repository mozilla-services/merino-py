services:
  redis-primary:
    image: redis:7.2
    container_name: redis-primary
    restart: always
    volumes:
      - redis_primary:/data
    ports:
      - 6379:6379

  redis-replica:
    image: redis:7.2
    container_name: redis-replica
    restart: always
    volumes:
      - redis_replica:/data
    ports:
      - 6380:6379
    command: redis-server --replicaof redis-primary 6379

  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    restart: always
    environment:
      - REDIS_HOSTS=local:redis-primary:6379
    ports:
      - 8081:8081
  fake-gcs:
    image: fsouza/fake-gcs-server
    container_name: fake-gcs-server
    restart: always
    ports:
      - 4443:4443
    volumes:
      - ./local_data/gcs_emulator:/data
    command: -port=4443 -public-host=localhost:4443 -scheme=http

  # Adapted from https://github.com/elastic/elasticsearch/blob/main/docs/reference/setup/install/docker/docker-compose.yml
  # Removed auth and certs, disabled ml, running in single-node rather than cluster mode
  # And using custom image to install plugins
  es01:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
      args:
        STACK_VERSION: ${STACK_VERSION}
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - ${ES_PORT}:9200
    environment:
      - node.name=es01
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - xpack.license.self_generated.type=${LICENSE}
    mem_limit: ${MEM_LIMIT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:9200/_cluster/health | grep -qv ''"status":"red"''',
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  kibana:
    depends_on:
      es01:
        condition: service_healthy
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    volumes:
      - kibanadata:/usr/share/kibana/data
    ports:
      - ${KIBANA_PORT}:5601
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=http://es01:9200
      - XPACK_ENTERPRISESEARCH_ENABLED=false
    mem_limit: ${MEM_LIMIT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  es-setup:
    image: curlimages/curl:latest
    depends_on:
      es01:
        condition: service_healthy
    volumes:
      - ./elasticsearch/setup.sh:/setup.sh:ro
      - ./elasticsearch/indexes:/es-indexes:ro
      - ./elasticsearch/seed:/es-seed:ro
    entrypoint: ["sh", "/setup.sh"]
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector:0.142.0
    restart: always
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318" # OTLP HTTP receiver
      - "9464:9464" # Prometheus scrape endpoint
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml", "-config.expand-env=true"]
    volumes:
      - ./otel/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200" # Tempo query endpoint

  prometheus:
    image: prom/prometheus:v2.49.1
    command: ["--config.file=/etc/prometheus/prometheus.yaml"]
    volumes:
      - ./otel/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:10.3.3
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      # Skip the initial admin password change UI
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./otel/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - prometheus

volumes:
  redis_primary:
  redis_replica:
  kibanadata:
    driver: local
  esdata01:
    driver: local
